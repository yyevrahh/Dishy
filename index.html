<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="icon" type="image/x-icon" href="res/dishy_icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js" type="module"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sintony:wght@400;700&display=swap" rel="stylesheet">
    <title>Dishy</title>
</head>
<body>
    <div id="app-root">
        <!-- Dynamic views will be loaded here: either #login-screen or #dashboard-screen -->
    </div>

    <!-- Notification Toasts -->
    <div id="saved" class="saved" style="display: none;">
        <div class="saved-content">
            <div class="check"></div>
            <p id="text-rec">Recipe saved successfully!</p>
            <button id="closePopup">OK</button>
        </div>
    </div>

    <div id="deleted" class="deleted" style="display: none;">
        <div class="deleted-content">
            <div class="check"></div>
            <p id="text-rec">Recipe deleted successfully!</p>
            <button id="closePopup2">OK</button>
        </div>
    </div>

    <div class="loader" style="display: none;"></div>

    <script src="app.js" type="module"></script>
</body>
</html>
